<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>⚔️ 던전 탐험</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── 장비 선택 화면 ───────────────────────────────── -->
  <div id="screen-equip" class="screen">
    <div class="select-card">
      <h1 class="select-title">⚔️ 던전 탐험</h1>
      <p class="select-sub">장비를 슬롯으로 드래그해서 착용하세요</p>

      <!-- 파피돌 (디아블로 스타일) -->
      <div class="paperdoll">
        <div class="doll-slot" data-slot="head">
          <span class="doll-slot-icon">🪖</span><span class="doll-slot-label">머리</span>
        </div>
        <div class="doll-char">
          <svg viewBox="0 0 60 130" width="54" height="118" aria-hidden="true">
            <defs>
              <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <circle cx="30" cy="18" r="13" fill="#12082a" stroke="#7c4dff" stroke-width="1.5" filter="url(#glow)"/>
            <rect x="18" y="34" width="24" height="34" rx="4" fill="#12082a" stroke="#7c4dff" stroke-width="1.5"/>
            <line x1="18" y1="38" x2="6"  y2="60" stroke="#7c4dff" stroke-width="2" stroke-linecap="round"/>
            <line x1="42" y1="38" x2="54" y2="60" stroke="#7c4dff" stroke-width="2" stroke-linecap="round"/>
            <line x1="24" y1="68" x2="22" y2="98" stroke="#7c4dff" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="36" y1="68" x2="38" y2="98" stroke="#7c4dff" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="22" y1="98" x2="16" y2="108" stroke="#7c4dff" stroke-width="2" stroke-linecap="round"/>
            <line x1="38" y1="98" x2="44" y2="108" stroke="#7c4dff" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="doll-slot" data-slot="accessory">
          <span class="doll-slot-icon">💍</span><span class="doll-slot-label">악세</span>
        </div>
        <div class="doll-slot" data-slot="weapon">
          <span class="doll-slot-icon">⚔️</span><span class="doll-slot-label">무기</span>
        </div>
        <div class="doll-slot" data-slot="chest">
          <span class="doll-slot-icon">🧥</span><span class="doll-slot-label">상의</span>
        </div>
        <div class="doll-slot" data-slot="gloves">
          <span class="doll-slot-icon">🧤</span><span class="doll-slot-label">장갑</span>
        </div>
        <div class="doll-slot" data-slot="pants">
          <span class="doll-slot-icon">👖</span><span class="doll-slot-label">하의</span>
        </div>
        <div class="doll-slot" data-slot="boots">
          <span class="doll-slot-icon">👢</span><span class="doll-slot-label">신발</span>
        </div>
      </div>

      <!-- 인벤토리 -->
      <div class="inv-panel">
        <div class="inv-panel-hdr">
          <span>보유 장비</span>
          <span id="equip-status" class="equip-status-badge"></span>
        </div>
        <div class="inv-grid" id="inv-grid"></div>
      </div>

      <div class="equip-btn-row">
        <button id="btn-enter" class="btn-primary" disabled>⚔️ 입장</button>
        <button id="btn-bare" class="btn-naked">🏃 맨손으로</button>
      </div>
    </div>
  </div>

  <!-- ── 게임 화면 ─────────────────────────────────────── -->
  <div id="screen-game" class="screen hidden">

    <!-- 상단 HUD -->
    <div class="hud-top">
      <div class="hud-main-row">
        <div class="hud-stat">
          <span class="hud-lbl">HP</span>
          <div class="bar-outer"><div id="hp-bar" class="bar"></div></div>
          <span id="hp-text" class="hud-val">100/100</span>
        </div>
        <div class="hud-mid">
          <span id="floor-lbl" class="floor-lbl">B1F</span>
          <span id="equip-name-hud" class="equip-lbl">맨손</span>
          <span id="armor-name-hud" class="equip-lbl equip-lbl-armor">방어구 없음</span>
        </div>
        <div class="hud-stat hud-stat-right">
          <span class="hud-lbl">내구</span>
          <div class="bar-outer"><div id="dur-bar" class="bar bar-dur"></div></div>
          <span id="dur-text" class="hud-val">-/-</span>
        </div>
      </div>
      <div class="hud-sta-row">
        <span class="hud-lbl">스태미나</span>
        <div class="bar-outer"><div id="sta-bar" class="bar bar-sta"></div></div>
        <span id="sta-text" class="hud-val">100</span>
      </div>
    </div>

    <!-- 캔버스 영역 -->
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>

      <!-- 반응 프롬프트 -->
      <div id="reaction-prompt" class="reaction-prompt hidden">
        <div class="rp-bar-outer"><div id="rp-bar" class="rp-bar"></div></div>
        <div class="rp-btns">
          <span class="rp-dodge">🏃 D패드 회피</span>
          <span id="rp-counter" class="rp-counter-btn">⚡ 반격 버튼</span>
        </div>
      </div>

      <!-- 토스트 메시지 -->
      <div id="toast" class="toast hidden"></div>
    </div>

    <!-- 하단 HUD -->
    <div class="hud-bottom">
      <div id="item-slots" class="item-slots"></div>
      <div class="dpad" aria-hidden="true">
        <div class="dpad-row">
          <button class="dpad-btn" data-dx="0" data-dy="-1">▲</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" data-dx="-1" data-dy="0">◀</button>
          <button class="dpad-btn dpad-ctr" id="btn-counter">⚡</button>
          <button class="dpad-btn" data-dx="1" data-dy="0">▶</button>
        </div>
        <div class="dpad-row">
          <button class="dpad-btn" data-dx="0" data-dy="1">▼</button>
        </div>
      </div>
    </div>

  </div>

  <!-- ── 사망 화면 ─────────────────────────────────────── -->
  <div id="screen-dead" class="screen hidden">
    <div class="dead-card">
      <p class="dead-emoji">💀</p>
      <h2 class="dead-title">전투 불능</h2>
      <p id="dead-stats" class="dead-stats"></p>
      <button id="btn-restart" class="btn-primary">다시 시작</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
